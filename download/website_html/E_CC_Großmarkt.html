                data-image-sources='/.imaging/focalpoint/socialmedia/1200x/dam/jcr:b23832d2-4b50-402e-a85b-79ca6ac6b17b/edeka-foodservice-grossmarkt-gang-trockenwaren-grossgebinde.jpg'
            data-config='{"image":{"title":"Großmarkt-Gang mit Trockenwaren und Gastro-Artikeln","alt":"Langer Gang im EDEKA Foodservice Großmarkt, links und rechts hohe Regale mit Trockenwaren &amp; Großgebinden","srcs":[{"src":"/.imaging/focalpoint/mobile-stage-4-2_7/300x/dam/jcr:b23832d2-4b50-402e-a85b-79ca6ac6b17b/edeka-foodservice-grossmarkt-gang-trockenwaren-grossgebinde.jpg","width":"300","media":"(max-width: 375px)","variation":"mobile-stage-4-2_7"},{"src":"/.imaging/focalpoint/block-1-1/600x/dam/jcr:b23832d2-4b50-402e-a85b-79ca6ac6b17b/edeka-foodservice-grossmarkt-gang-trockenwaren-grossgebinde.jpg","width":"600","media":"(max-width: 1100px)","variation":"block-1-1"},{"src":"/.imaging/focalpoint/block-1-1/600x/dam/jcr:b23832d2-4b50-402e-a85b-79ca6ac6b17b/edeka-foodservice-grossmarkt-gang-trockenwaren-grossgebinde.jpg","width":"600","media":"(min-width: 1100px)","variation":"block-1-1"}]},"headline":"Von Käse bis Küchenbedarf: Alles für Ihren Betrieb in Bamberg","mobileHeadline":"","headlineLevel":"h2","text":"&lt;p&gt;In Oberfranken, n&amp;ouml;rdlich von Bayern, finden Sie seit 1974 den EDEKA Foodservice Bamberg &amp;ndash; Ihren verl&amp;auml;sslichen Gro&amp;szlig;markt f&amp;uuml;r Hotellerie, Gastronomie, Gemeinschaftsverpflegung und Handel. Mit &amp;uuml;ber 80 C&amp;C-M&amp;auml;rkten und Lagerstandorten deutschlandweit sind wir Teil eines starken Netzwerks.&lt;/p&gt;<br/><br/>&lt;p&gt;Am Standort Bamberg erwartet Sie auf 2.545 m&amp;sup2; Verkaufsfl&amp;auml;che eine sorgf&amp;auml;ltig zusammengestellte Auswahl von rund 15.500 Artikeln. Besonders beliebt sind unsere saisonalen Sortimente, die exklusive K&amp;auml;seauswahl sowie das umfangreiche Non-Food-Angebot.&lt;/p&gt;<br/><br/>&lt;p&gt;Mehr als 40 Mitarbeitende stehen Ihnen jederzeit mit pers&amp;ouml;nlicher Beratung zur Seite.&lt;br /&gt;<br/>&amp;nbsp;&lt;/p&gt;<br/>","introText":"","moreText":"&lt;h3&gt;Entspannt und effizient einkaufen im EDEKA C&amp;C Bamberg&lt;/h3&gt;<br/><br/>&lt;p&gt;Unser Team kennt die Anforderungen von Gro&amp;szlig;verbrauchern ganz genau und sorgt daf&amp;uuml;r, dass Ihr Einkauf professionell, unkompliziert und angenehm verl&amp;auml;uft. Sauberkeit, geordnete Regale und ein vielseitiges Sortiment sind f&amp;uuml;r uns selbstverst&amp;auml;ndlich &amp;ndash; genauso wie echte Kundenorientierung.&lt;/p&gt;<br/><br/>&lt;p&gt;Besuchen Sie den EDEKA Foodservice Bamberg und &amp;uuml;berzeugen Sie sich selbst von unserer Produktvielfalt und unserem Service. Wir freuen uns auf Sie!&lt;/p&gt;<br/>","moreTextButtonLabel":"Mehr anzeigen","closeTextButtonLabel":"Schließen","imagePosition":"left","desktopVariant":"block-1-1","mobileVariant":"mobile-stage-4-2_7","imageSize":"big","link":{},"componentClasses":{"theme":"white","spacing":"default"},"editMode":false}'
    ></cmp-text-image>

<cmp-accordion-item data-config='{"title":"Was benötige ich, um bei Ihnen einkaufen zu können?","open":false,"editMode":false}'>



    <cmp-text-image
            data-config='{"image":{},"headline":"","mobileHeadline":"","headlineLevel":"h2","text":"&lt;p&gt;Der Einkauf im EDEKA Foodservice Gro&amp;szlig;markt ist ausschlie&amp;szlig;lich f&amp;uuml;r Gewerbetreibende, Selbstst&amp;auml;ndige, Freiberufler sowie Institutionen, Beh&amp;ouml;rden und Vereine m&amp;ouml;glich. Um bei uns einkaufen zu k&amp;ouml;nnen, ben&amp;ouml;tigen Sie eine Kundenkarte, den sogenannten Einkaufsausweis.&lt;/p&gt;<br/><br/>&lt;p&gt;F&amp;uuml;r die Ausstellung der Kundenkarte m&amp;uuml;ssen Sie einen Nachweis Ihrer unternehmerischen T&amp;auml;tigkeit erbringen, beispielsweise eine Gewerbeanmeldung, eine aktuelle Steuerbescheinigung, einen Handelsregisterauszug oder einen Vereinsregisterauszug. Sie k&amp;ouml;nnen sich bequem &lt;a href=\"/kundenkarte\" target=\"_blank\" title=\"Kunde werden bei EDEKA Foodservice\"&gt;online registrieren&lt;/a&gt; oder die Kundenkarte direkt vor Ort in Bamberg beantragen.&lt;/p&gt;<br/>","introText":"","moreText":"","moreTextButtonLabel":"Mehr anzeigen","closeTextButtonLabel":"Schließen","imagePosition":"left","desktopVariant":"landscape-4-2_7","mobileVariant":"","imageSize":"big","link":{},"componentClasses":{"theme":"dark","spacing":"default"},"editMode":false}'
    ></cmp-text-image>

</cmp-accordion-item>


<cmp-accordion-item data-config='{"title":"Wie kann ich bei Ihnen bestellen?","open":false,"editMode":false}'>



    <cmp-text-image
            data-config='{"image":{},"headline":"","mobileHeadline":"","headlineLevel":"h2","text":"&lt;p&gt;Bestellungen sind telefonisch, per E-Mail oder pers&amp;ouml;nlich im Markt m&amp;ouml;glich. F&amp;uuml;r digitale Bestellungen k&amp;ouml;nnen Sie auch die &lt;a href=\"/services/kassensysteme-bestellsysteme/choco\" target=\"_blank\" title=\"Informationen zum Bestellsystem Choco\"&gt;CHOCO-App&lt;/a&gt; oder die Online-Bestellplattformen &lt;a href=\"/services/kassensysteme-bestellsysteme/selly\" target=\"_blank\" title=\"Informationen zum Bestellsystem Selly\"&gt;Selly&lt;/a&gt; und &lt;a href=\"/services/kassensysteme-bestellsysteme/foodnotify\" target=\"_blank\" title=\"Informationen zum Bestellsystem Foodnotify\"&gt;Foodnotify&lt;/a&gt; nutzen, die speziell f&amp;uuml;r Gastronomie und Gro&amp;szlig;verbraucher entwickelt wurden.&lt;/p&gt;<br/>","introText":"","moreText":"","moreTextButtonLabel":"Mehr anzeigen","closeTextButtonLabel":"Schließen","imagePosition":"left","desktopVariant":"landscape-4-2_7","mobileVariant":"","imageSize":"big","link":{},"componentClasses":{"theme":"dark","spacing":"default"},"editMode":false}'
    ></cmp-text-image>

</cmp-accordion-item>


<cmp-accordion-item data-config='{"title":"Gibt es aktuell Aktionen? Welche Angebote oder Rabatte bieten Sie momentan an? Wann findet der nächste „Jetzt oder Nie“-Tag statt?","open":false,"editMode":false}'>



    <cmp-text-image
            data-config='{"image":{},"headline":"","mobileHeadline":"","headlineLevel":"h2","text":"&lt;p&gt;Es gibt dauerhaft wechselnde Aktionen und Top-Angebote, die auch per &lt;a href=\"/angebote-abonnieren/newsletter-anmeldung\" target=\"_blank\" title=\"Anmeldung zum Newsletter\"&gt;Newsletter&lt;/a&gt; oder &lt;a href=\"/angebote-abonnieren/whatsapp-anmeldung\" target=\"_blank\" title=\"Anmeldung zum WhatsApp-Service\"&gt;WhatsApp&lt;/a&gt; versendet werden. Der &amp;bdquo;Jetzt oder Nie&amp;ldquo;-Tag, an dem Sie einmalig 10 % Rabatt auf alles erhalten, Gratis-Zugaben sowie Treueaktionen (z. B. Chef Cuisine Pr&amp;auml;mien) werden rechtzeitig digital und &amp;uuml;ber unsere Werbung angek&amp;uuml;ndigt.&lt;/p&gt;<br/>","introText":"","moreText":"","moreTextButtonLabel":"Mehr anzeigen","closeTextButtonLabel":"Schließen","imagePosition":"left","desktopVariant":"landscape-4-2_7","mobileVariant":"","imageSize":"big","link":{},"componentClasses":{"theme":"dark","spacing":"default"},"editMode":false}'
    ></cmp-text-image>

</cmp-accordion-item>


<cmp-accordion-item data-config='{"title":"Gibt es Ihre Werbung auch per E-Mail?","open":false,"editMode":false}'>



    <cmp-text-image
            data-config='{"image":{},"headline":"","mobileHeadline":"","headlineLevel":"h2","text":"&lt;p&gt;Unsere aktuellen Angebote und Aktionen erhalten Sie nicht nur per Post, sondern k&amp;ouml;nnen sie jederzeit auch online im &lt;a href=\"/angebote\" target=\"_blank\" title=\"Angebote bei EDEKA Foodservice\"&gt;Angebotsbereich&lt;/a&gt; einsehen. Und wenn Sie m&amp;ouml;chten, informieren wir Sie ganz bequem per &lt;a href=\"/angebote-abonnieren/whatsapp-anmeldung\" target=\"_blank\" title=\"Anmeldung zum WhatsApp-Service\"&gt;WhatsApp&lt;/a&gt;&amp;nbsp;oder &lt;a href=\"/angebote-abonnieren/newsletter-anmeldung\" target=\"_blank\" title=\"Anmeldung zum Newsletter\"&gt;Newsletter&lt;/a&gt;&amp;nbsp;&amp;uuml;ber die neuesten Angebote und Aktionen.&lt;/p&gt;<br/>","introText":"","moreText":"","moreTextButtonLabel":"Mehr anzeigen","closeTextButtonLabel":"Schließen","imagePosition":"left","desktopVariant":"landscape-4-2_7","mobileVariant":"","imageSize":"big","link":{},"componentClasses":{"theme":"dark","spacing":"default"},"editMode":false}'
    ></cmp-text-image>

</cmp-accordion-item>


<cmp-accordion-item data-config='{"title":"Gibt es Sonderpreise bei der Abnahme von Großmengen?","open":false,"editMode":false}'>



    <cmp-text-image
            data-config='{"image":{},"headline":"","mobileHeadline":"","headlineLevel":"h2","text":"&lt;p&gt;F&amp;uuml;r gro&amp;szlig;e Abnahmemengen, Aktionen oder l&amp;auml;ngerfristige Rahmenvertr&amp;auml;ge k&amp;ouml;nnen individuelle Preise bzw. Rabatte vereinbart werden. Sprechen Sie uns an!&lt;/p&gt;<br/>","introText":"","moreText":"","moreTextButtonLabel":"Mehr anzeigen","closeTextButtonLabel":"Schließen","imagePosition":"left","desktopVariant":"landscape-4-2_7","mobileVariant":"","imageSize":"big","link":{},"componentClasses":{"theme":"dark","spacing":"default"},"editMode":false}'
    ></cmp-text-image>

</cmp-accordion-item>


<cmp-accordion-item data-config='{"title":"Können Sie bei Festlichkeiten wie z.B. bei Vereinsevents auch eine Sonderlieferung vornehmen?  ","open":false,"editMode":false}'>



    <cmp-text-image
            data-config='{"image":{},"headline":"","mobileHeadline":"","headlineLevel":"h2","text":"&lt;p&gt;Sonderlieferungen (z.B. besonders gro&amp;szlig;e Mengen zu Veranstaltungen) sind nach Absprache m&amp;ouml;glich. Es empfiehlt sich fr&amp;uuml;hzeitig Kontakt mit Ihrem Markt aufzunehmen, um Details und Liefertermine zu kl&amp;auml;ren.&lt;/p&gt;<br/>","introText":"","moreText":"","moreTextButtonLabel":"Mehr anzeigen","closeTextButtonLabel":"Schließen","imagePosition":"left","desktopVariant":"landscape-4-2_7","mobileVariant":"","imageSize":"big","link":{},"componentClasses":{"theme":"dark","spacing":"default"},"editMode":false}'
